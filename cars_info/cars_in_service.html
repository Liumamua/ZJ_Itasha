            animation: gradientShift 12s ease infinite;

        @keyframes gradientShift {

            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .glass-card {
            background: rgba(22, 22, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);

        }

            background: #2d2d4a;
            border-radius: 3px;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);

        body {

    <script>
        function confirmEnterPast() {
            if (confirm('英灵殿内为已换版的过往作品或存在绝版人物的作品，请在家长陪同下谨慎观看。')) {
                window.location.href = 'cars_retired.html';
            }
        }
        (function () {
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) { if (e.isIntersecting) { setTimeout(function () { e.target.classList.add("visible"); }, 100); observer.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll(".fade-up").forEach(function (el) { observer.observe(el); });
            setTimeout(function () { document.querySelectorAll(".fade-up").forEach(function (el) { if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add("visible"); }); }, 200);
        })();
        document.addEventListener('DOMContentLoaded', function () {
            const zjLogo = document.getElementById('zjLogo');
            if (zjLogo) zjLogo.onerror = function () { this.style.display = 'none'; const fb = document.getElementById('zjLogoFallback'); if (fb) fb.style.display = 'inline-block'; };
            const asoulLogo = document.getElementById('asoulLogo');
            if (asoulLogo) asoulLogo.onerror = function () { this.style.display = 'none'; const fb = document.getElementById('asoulLogoFallback'); if (fb) fb.style.display = 'inline-block'; };
        });
        window.addEventListener('scroll', function () {
            var navbar = document.getElementById("navbar");
            if (window.scrollY > 50) navbar.classList.add("shadow-lg", "shadow-black/30");
            else navbar.classList.remove("shadow-lg", "shadow-black/30");
        });
        (function () {
            var menuBtn = document.getElementById("menuBtn");
            var mobileMenu = document.getElementById("mobileMenu");
            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener("click", function () {
                    mobileMenu.classList.toggle("hidden");
                    var icon = menuBtn.querySelector("i");
                    icon.classList.toggle("fa-bars"); icon.classList.toggle("fa-times");
                });
            }
        })();
    </script>
